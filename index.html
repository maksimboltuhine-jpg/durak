<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.socket.io; style-src 'self' 'unsafe-inline';">
    <title>Дурак Онлайн</title>
    <style>
        body { background: #2d5a27; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; }
        #game-container { width: 90%; max-width: 800px; text-align: center; }
        #table { 
            background: rgba(0,0,0,0.2); border: 3px dashed #1a3c17; border-radius: 20px; 
            min-height: 200px; margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; 
        }
        .card { 
            width: 70px; height: 100px; background: white; color: black; border-radius: 8px; 
            margin: 5px; display: flex; justify-content: center; align-items: center; 
            font-size: 20px; font-weight: bold; border: 2px solid #333; cursor: pointer; transition: 0.2s;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .red { color: #e74c3c; }
        .trump-area { font-size: 24px; margin-bottom: 10px; background: #1a3c17; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Дурак Online</h1>
    <div class="trump-area">Козырь: <span id="trump-val">?</span></div>
    
    <p>Стол:</p>
    <div id="table"></div>

    <p>Ваши карты (нажми, чтобы сходить):</p>
    <div id="myHand"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const tableDiv = document.getElementById('table');
    const handDiv = document.getElementById('myHand');
    const trumpSpan = document.getElementById('trump-val');

    socket.emit('joinGame', 'Игрок');

    socket.on('updateState', (state) => {
        // Обновляем козырь
        if(state.trump) {
            trumpSpan.innerText = `${state.trump.value}${state.trump.suit}`;
            trumpSpan.style.color = ['♥','♦'].includes(state.trump.suit) ? '#e74c3c' : 'white';
        }

        // Чистим стол и руку
        tableDiv.innerHTML = '';
        handDiv.innerHTML = '';

        // Рисуем стол
        state.table.forEach(card => {
            tableDiv.appendChild(createCardEl(card));
        });

        // Рисуем руку
        const myData = state.players[socket.id];
        if (myData) {
            myData.hand.forEach((card, index) => {
                const el = createCardEl(card);
                el.onclick = () => socket.emit('playCard', index);
                handDiv.appendChild(el);
            });
        }
    });

    function createCardEl(card) {
        const div = document.createElement('div');
        const isRed = ['♥','♦'].includes(card.suit);
        div.className = `card ${isRed ? 'red' : ''}`;
        div.innerText = card.value + card.suit;
        return div;
    }
</script>
</body>
</html>
