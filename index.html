<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.onrender.com; script-src 'self' 'unsafe-inline' https://*.onrender.com https://cdn.socket.io; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.onrender.com wss://*.onrender.com; img-src 'self' data: https://*.yastatic.net https://*.yandex.ru;">
    <title>Дурак Онлайн - Полная Версия</title>
    <style>
        body { background: #1b4317; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        #menu { margin-top: 100px; }
        button, select { padding: 10px 20px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; }
        button { background: #f1c40f; color: black; font-weight: bold; }
        button:hover { background: #d4ac0d; }
        
        #table-area { min-height: 250px; background: rgba(0,0,0,0.2); border-radius: 15px; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 20px; margin: 20px auto; max-width: 900px; flex-wrap: wrap; }
        .card-pair { display: flex; flex-direction: column; gap: -50px; position: relative; }
        .card { width: 70px; height: 100px; background: white; color: black; border-radius: 8px; border: 2px solid #333; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        .card.red { color: #e74c3c; }
        .defense-card { position: absolute; top: 20px; left: 15px; z-index: 2; }
        
        #hand { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .info-panel { display: flex; justify-content: space-between; max-width: 900px; margin: 0 auto; background: #0f2b0c; padding: 10px 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="menu">
    <h1>Настройки игры</h1>
    <label>Размер колоды: </label>
    <select id="deck-size">
        <option value="24">24 карты</option>
        <option value="36" selected>36 карт (Классика)</option>
        <option value="52">52 карты</option>
    </select>
    

    <button onclick="startGame()">Играть с Ботом</button>
</div>

<div id="game" class="hidden">
    <div class="info-panel">
        <div>Колода: <span id="deck-count">0</span> шт.</div>
        <div style="color: #f1c40f;">Козырь: <span id="trump-info">?</span></div>
        <div id="turn-info" style="font-weight: bold; color: #3498db;">Ваш ход!</div>
    </div>

    <div id="table-area"></div>

    <div style="margin-top: 15px;">
        <button id="btn-pass" onclick="sendAction('pass')">Бито / Пас</button>
        <button id="btn-take" onclick="sendAction('take')">Беру</button>
    </div>

    <h3 style="margin-bottom: 5px;">Ваши карты:</h3>
    <div id="hand"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    function startGame() {
        const size = parseInt(document.getElementById('deck-size').value);
        socket.emit('startBotGame', size);
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
    }

    function sendAction(action) { socket.emit('actionBtn', action); }

    function makeCardUI(card, isDefense = false) {
        if (!card) return '';
        const isRed = ['♥','♦'].includes(card.suit);
        const classes = `card ${isRed ? 'red' : ''} ${isDefense ? 'defense-card' : ''}`;
        return `<div class="${classes}">${card.value}${card.suit}</div>`;
    }

    socket.on('updateState', (state) => {
        if (state.status !== 'playing') return;

        // Обновляем статус
        document.getElementById('deck-count').innerText = state.deck.length;
        if(state.trump) {
            document.getElementById('trump-info').innerText = state.trump.value + state.trump.suit;
        }

        const myIndex = state.players.findIndex(p => p.id === socket.id);
        const isMyTurnToAttack = state.attackerIndex === myIndex;
        document.getElementById('turn-info').innerText = isMyTurnToAttack ? "ВЫ АТАКУЕТЕ ⚔️" : "ВЫ ЗАЩИЩАЕТЕСЬ 🛡️";
        document.getElementById('turn-info').style.color = isMyTurnToAttack ? "#e74c3c" : "#3498db";

        // Кнопки
        document.getElementById('btn-pass').style.display = isMyTurnToAttack ? 'inline-block' : 'none';
        document.getElementById('btn-take').style.display = !isMyTurnToAttack ? 'inline-block' : 'none';

        // Рисуем стол
        const tableArea = document.getElementById('table-area');
        tableArea.innerHTML = '';
        state.table.forEach(pair => {
            const pairDiv = document.createElement('div');
            pairDiv.className = 'card-pair';
            pairDiv.innerHTML = makeCardUI(pair.attack) + (pair.defense ? makeCardUI(pair.defense, true) : '');
            tableArea.appendChild(pairDiv);
        });

        // Рисуем руку
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = '';
        const myData = state.players[myIndex];
        if (myData) {
            myData.hand.forEach((card, i) => {
                const cardEl = document.createElement('div');
                cardEl.innerHTML = makeCardUI(card);
                cardEl.firstElementChild.onclick = () => socket.emit('playCard', i);
                handDiv.appendChild(cardEl.firstElementChild);
            });
        }
    });
</script>
</body>
</html>
