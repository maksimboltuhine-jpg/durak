<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.onrender.com; script-src 'self' 'unsafe-inline' https://*.onrender.com https://cdn.socket.io; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.onrender.com wss://*.onrender.com; img-src 'self' data: https://*.yastatic.net https://*.yandex.ru;">
    
    <title>Дурак Онлайн</title>
    <style>
        body { background: #2d5a27; color: white; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        #game-container { width: 100%; max-width: 800px; text-align: center; }
        
        .trump-info { font-size: 24px; margin: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        
        #table { 
            background: rgba(0,0,0,0.2); border: 3px dashed rgba(255,255,255,0.3); 
            min-height: 180px; margin: 20px 0; border-radius: 20px; 
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center; 
        }
        
        .card { 
            width: 75px; height: 110px; background: white; color: black; border-radius: 10px; 
            margin: 8px; display: flex; justify-content: center; align-items: center; 
            font-size: 22px; font-weight: bold; border: 2px solid #333; 
            cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-10px); }
        .red { color: #e74c3c; }
        
        #myHand { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        h3 { margin-bottom: 5px; color: #f1c40f; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Дурак Online</h1>
    
    <div class="trump-info">Козырь: <span id="trump-val">?</span></div>
    
    <h3>Стол</h3>
    <div id="table"></div>

    <h3>Ваши карты</h3>
    <div id="myHand"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const tableDiv = document.getElementById('table');
    const handDiv = document.getElementById('myHand');
    const trumpSpan = document.getElementById('trump-val');

    // Авто-вход при загрузке
    socket.emit('joinGame', 'Игрок 1');

    socket.on('updateState', (state) => {
        // Отображение козыря
        if(state.trump) {
            trumpSpan.innerText = `${state.trump.value}${state.trump.suit}`;
            trumpSpan.style.color = ['♥','♦'].includes(state.trump.suit) ? '#e74c3c' : 'white';
        }

        // Очистка
        tableDiv.innerHTML = '';
        handDiv.innerHTML = '';

        // Рисуем карты на столе
        state.table.forEach(card => {
            tableDiv.appendChild(createCardEl(card));
        });

        // Рисуем карты игрока
        const myData = state.players[socket.id];
        if (myData) {
            myData.hand.forEach((card, index) => {
                const el = createCardEl(card);
                el.onclick = () => socket.emit('playCard', index);
                handDiv.appendChild(el);
            });
        }
    });

    function createCardEl(card) {
        const div = document.createElement('div');
        const isRed = ['♥','♦'].includes(card.suit);
        div.className = `card ${isRed ? 'red' : ''}`;
        div.innerText = card.value + card.suit;
        return div;
    }
</script>
</body>
</html>
